<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远明老师的课堂笔记 - C++ 信奥知识点</title>
    <link rel="icon" href="assets/favicon.ico">
    <script src="https://cdn.jsdelivr.net/gh/sirwym/notes@main/assets/js/tailwind.js"
            onerror="this.onerror=null;this.src='assets/js/tailwind.js'"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        /* 分类选项卡 */
        .tab-btn {
            position: relative;
            transition: color 0.2s ease;
        }
        .tab-btn.active {
            color: #2563eb;
            font-weight: 600;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #2563eb;
            border-radius: 2px 2px 0 0;
        }

        /* 知识点筛选按钮 */
        .topic-btn {
            transition: all 0.15s ease;
        }
        .topic-btn.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* 内容卡片 */
        .note-card {
            transition: all 0.2s ease;
        }
        .note-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1);
        }

        /* 标签颜色 */
        .tag-animation { background-color: #ede9fe; color: #7c3aed; }
        .tag-game { background-color: #fce7f3; color: #db2777; }
        .tag-cpp { background-color: #dbeafe; color: #2563eb; }
        .tag-ai { background-color: #d1fae5; color: #059669; }

        /* 搜索框 */
        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* 空状态 */
        .empty-state {
            display: none;
        }
        .empty-state.visible {
            display: flex;
        }

        /* 返回顶部 */
        .back-to-top {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* 分页 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 2rem;
            padding-bottom: 1rem;
        }
        .pagination button {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            color: #6b7280;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .pagination button:hover:not(:disabled) {
            border-color: #2563eb;
            color: #2563eb;
        }
        .pagination button.active {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
            font-weight: 600;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .page-info {
            font-size: 12px;
            color: #9ca3af;
            margin-left: 12px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- 顶部 -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-4 py-6 text-center">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-brand-50 text-brand-600 rounded-full text-xs font-medium mb-3">
                <img src="assets/logo.png" alt="Logo" class="w-4 h-4 rounded">
                远明老师的课堂笔记
            </div>
            <h1 class="text-3xl font-bold text-gray-900">C++ · 算法 · 数学思维</h1>
            <p class="text-gray-500 mt-2 text-sm">交互动画 · 知识点游戏 · 代码模板 · 轻松理解核心概念</p>
            <div class="mt-3">
                <a href="https://exam.yuanming.wang" target="_blank"
                   class="inline-flex items-center gap-1 text-xs text-brand-500 hover:text-brand-700 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    赛事刷题
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">

        <!-- 搜索栏 -->
        <div class="mb-6">
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" id="searchInput" placeholder="搜索知识点..."
                       class="search-input w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 placeholder-gray-400">
            </div>
        </div>

        <!-- 一级分类选项卡 -->
        <div class="flex items-center border-b border-gray-200 mb-4 overflow-x-auto" id="categoryTabs">
            <button class="tab-btn px-5 py-3 text-sm text-gray-500 hover:text-gray-700 whitespace-nowrap active" data-category="all" onclick="switchCategory('all')">
                全部
            </button>
            <button class="tab-btn px-5 py-3 text-sm text-gray-500 hover:text-gray-700 whitespace-nowrap" data-category="animation" onclick="switchCategory('animation')">
                算法动画
            </button>
            <button class="tab-btn px-5 py-3 text-sm text-gray-500 hover:text-gray-700 whitespace-nowrap" data-category="game" onclick="switchCategory('game')">
                知识点游戏
            </button>
            <button class="tab-btn px-5 py-3 text-sm text-gray-500 hover:text-gray-700 whitespace-nowrap" data-category="cpp" onclick="switchCategory('cpp')">
                C++ 模板
            </button>
            <button class="tab-btn px-5 py-3 text-sm text-gray-500 hover:text-gray-700 whitespace-nowrap" data-category="ai" onclick="switchCategory('ai')">
                AI 实验室
            </button>
        </div>

        <!-- 二级知识点筛选 -->
        <div class="flex items-center gap-2 mb-6 flex-wrap" id="topicFilters">
            {{topic_buttons}}
        </div>

        <!-- 内容网格（由 build.py 生成） -->
        <div class="grid gap-4 sm:grid-cols-2" id="noteGrid">
{{cards}}
        </div>

        <!-- 空状态 -->
        <div class="empty-state flex-col items-center justify-center py-16 text-center" id="emptyState">
            <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <p class="text-gray-400 text-lg font-medium">没有找到匹配的内容</p>
            <p class="text-gray-300 text-sm mt-1">试试其他关键词或分类</p>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination" style="display:none;"></div>

    </main>

    <!-- 返回顶部 -->
    <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"
            class="back-to-top fixed bottom-6 right-6 w-10 h-10 bg-white border border-gray-200 rounded-full shadow-lg flex items-center justify-center text-gray-500 hover:text-brand-600 hover:border-brand-300 transition-colors z-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
    </button>

    <!-- 底部 -->
    <footer class="max-w-5xl mx-auto px-4 py-8 text-center">
        <p class="text-xs text-gray-400">纯静态 · 无需服务器 · 离线可用</p>
        <p class="text-xs text-gray-400 mt-1">© 2026 YuanMing</p>
    </footer>

    <script>
        // ===== 状态 =====
        let currentCategory = 'all';
        let currentTopic = 'all';
        let currentPage = 1;
        const PAGE_SIZE = 12; // 每页显示 12 个卡片

        // ===== 知识点列表（由 build.py 生成） =====
        const ALL_TOPICS = {{topics_json}};

        // ===== 从 URL 恢复状态 =====
        function loadStateFromURL() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('cat')) currentCategory = params.get('cat');
            if (params.has('topic')) currentTopic = params.get('topic');
            if (params.has('page')) currentPage = parseInt(params.get('page')) || 1;
        }

        // ===== 将状态写入 URL =====
        function saveStateToURL(replace) {
            const params = new URLSearchParams();
            if (currentCategory !== 'all') params.set('cat', currentCategory);
            if (currentTopic !== 'all') params.set('topic', currentTopic);
            if (currentPage > 1) params.set('page', currentPage);

            const qs = params.toString();
            const url = window.location.pathname + (qs ? '?' + qs : '');

            if (replace) {
                history.replaceState(null, '', url);
            } else {
                history.pushState(null, '', url);
            }
        }

        // ===== 切换一级分类 =====
        function switchCategory(cat) {
            currentCategory = cat;
            currentTopic = 'all';
            currentPage = 1;

            // 更新选项卡样式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === cat);
            });

            // 更新知识点筛选按钮
            updateTopicFilters();

            filterNotes();
            saveStateToURL(false);
        }

        // ===== 切换知识点 =====
        function switchTopic(topic) {
            currentTopic = topic;
            currentPage = 1;

            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.topic === topic);
            });

            filterNotes();
            saveStateToURL(false);
        }

        // ===== 更新知识点筛选按钮 =====
        function updateTopicFilters() {
            const container = document.getElementById('topicFilters');

            // 根据当前分类筛选可用的知识点
            let visibleTopics;
            if (currentCategory === 'all') {
                visibleTopics = ALL_TOPICS;
            } else {
                const cards = document.querySelectorAll('.note-card');
                const topicSet = new Set();
                cards.forEach(card => {
                    if (card.dataset.category === currentCategory && card.dataset.topic) {
                        topicSet.add(card.dataset.topic);
                    }
                });
                visibleTopics = ALL_TOPICS.filter(t => topicSet.has(t));
            }

            let html = '<button class="topic-btn px-3 py-1.5 text-xs font-medium border border-gray-200 rounded-lg text-gray-600 hover:border-brand-300 active" data-topic="all" onclick="switchTopic(\'all\')">全部</button>\n            ';
            visibleTopics.forEach(t => {
                html += `<button class="topic-btn px-3 py-1.5 text-xs font-medium border border-gray-200 rounded-lg text-gray-600 hover:border-brand-300" data-topic="${t}" onclick="switchTopic('${t}')">${t}</button>\n            `;
            });

            container.innerHTML = html;
        }

        // ===== 搜索 =====
        const searchInput = document.getElementById('searchInput');
        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                filterNotes();
                // 搜索不写入 history（避免每次按键都产生历史记录）
                saveStateToURL(true);
            }, 200);
        });

        // ===== 过滤 + 分页 =====
        function filterNotes() {
            const keyword = searchInput.value.trim().toLowerCase();
            const cards = document.querySelectorAll('.note-card');

            // 第一步：收集匹配的卡片
            const matched = [];
            cards.forEach(card => {
                const cat = card.dataset.category;
                const topic = card.dataset.topic || '';
                const tags = (card.dataset.tags || '').toLowerCase();
                const title = card.querySelector('h3').textContent.toLowerCase();
                const desc = card.querySelector('p') ? card.querySelector('p').textContent.toLowerCase() : '';

                const matchCat = currentCategory === 'all' || cat === currentCategory;
                const matchTopic = currentTopic === 'all' || topic === currentTopic;
                const matchSearch = !keyword || title.includes(keyword) || desc.includes(keyword) || tags.includes(keyword);

                if (matchCat && matchTopic && matchSearch) {
                    matched.push(card);
                }
            });

            // 第二步：根据分页决定显示/隐藏
            const totalPages = Math.max(1, Math.ceil(matched.length / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;

            // 先隐藏所有
            cards.forEach(card => card.style.display = 'none');
            // 显示当前页的匹配卡片
            matched.forEach((card, idx) => {
                if (idx >= start && idx < end) {
                    card.style.display = '';
                }
            });

            // 空状态
            const emptyState = document.getElementById('emptyState');
            emptyState.classList.toggle('visible', matched.length === 0);

            // 分页控件
            renderPagination(matched.length, totalPages);
        }

        // ===== 渲染分页 =====
        function renderPagination(totalItems, totalPages) {
            const container = document.getElementById('pagination');

            // 只有一页或无数据时隐藏分页
            if (totalPages <= 1) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'flex';
            let html = '';

            // 上一页
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>`;

            // 页码按钮（最多显示 7 个页码，中间用省略号）
            const pages = generatePageNumbers(currentPage, totalPages);
            pages.forEach(p => {
                if (p === '...') {
                    html += `<button disabled style="border:none;background:transparent;min-width:24px;color:#9ca3af;">...</button>`;
                } else {
                    html += `<button class="${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
                }
            });

            // 下一页
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>`;

            // 页码信息
            html += `<span class="page-info">共 ${totalItems} 项</span>`;

            container.innerHTML = html;
        }

        // ===== 生成页码列表（带省略号） =====
        function generatePageNumbers(current, total) {
            if (total <= 7) {
                return Array.from({length: total}, (_, i) => i + 1);
            }

            const pages = [];
            // 始终显示第1页
            pages.push(1);

            if (current > 4) {
                pages.push('...');
            }

            // 当前页附近的页码
            const rangeStart = Math.max(2, current - 1);
            const rangeEnd = Math.min(total - 1, current + 1);
            for (let i = rangeStart; i <= rangeEnd; i++) {
                pages.push(i);
            }

            if (current < total - 3) {
                pages.push('...');
            }

            // 始终显示最后一页
            pages.push(total);

            return pages;
        }

        // ===== 跳转页码 =====
        function goToPage(page) {
            currentPage = page;
            filterNotes();
            saveStateToURL(false);
            // 滚动到内容区域顶部
            document.getElementById('noteGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ===== 浏览器前进/后退 =====
        window.addEventListener('popstate', () => {
            loadStateFromURL();
            // 恢复 UI 状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === currentCategory);
            });
            updateTopicFilters();
            // 恢复知识点按钮高亮
            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.topic === currentTopic);
            });
            filterNotes();
        });

        // ===== 返回顶部按钮 =====
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 300);
        });

        // ===== 页面初始化 =====
        loadStateFromURL();
        // 恢复 UI 状态
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.category === currentCategory);
        });
        updateTopicFilters();
        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.topic === currentTopic);
        });
        // 关键：首次加载必须调用 filterNotes() 来应用分页
        filterNotes();
        // 将初始状态写入 URL（replace，不产生多余历史记录）
        saveStateToURL(true);
    </script>
</body>
</html>
