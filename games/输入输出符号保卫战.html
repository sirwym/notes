<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>输入输出符号保卫战 - 远明老师的课堂笔记</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-color: #ffffff;
            --primary-color: #2563eb; /* Brand Blue */
            --danger-color: #ff3e3e;
            --accent-color: #2563eb;
            --text-color: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
        }

        #hud {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 2px solid var(--primary-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            z-index: 10;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        #canvas-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controls {
            padding: 20px;
            background: var(--panel-color);
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .instruction-text {
            text-align: center;
            font-size: 14px;
            margin-bottom: 5px;
            color: #64748b;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            flex: 1;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            max-width: 200px;
        }

        #btn-left {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 0 #1d4ed8;
        }

        #btn-right {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            box-shadow: 0 4px 0 #3730a3;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 { color: var(--primary-color); margin-bottom: 10px; }
        p { line-height: 1.6; margin-bottom: 20px; }

        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: var(--primary-color);
            color: black;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: scale 0.2s;
        }

        .start-btn:hover { scale: 1.05; }

        .key-tip {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--primary-color);
            font-weight: bold;
        }

        #achievement-popup {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(37, 99, 235, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 200;
            pointer-events: none;
            animation: slideUp 2s forwards;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            20% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }

        .feedback-hit {
            position: absolute;
            font-weight: bold;
            font-size: 24px;
            color: var(--primary-color);
            pointer-events: none;
            animation: fadeFloat 0.8s forwards;
        }

        @keyframes fadeFloat {
            to { opacity: 0; transform: translateY(-50px); }
        }
    </style>

<link rel="stylesheet" href="../assets/css/katex.min.css">
<script src="../assets/js/katex.min.js"></script>
<script src="../assets/js/auto-render.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const katexOptions = {
        delimiters: [
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
        ],
        throwOnError: false,
        strict: false,
        trust: true
    };

    let renderTimeout;
    function safeRender() {
        if (renderTimeout) clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => {
            renderMathInElement(document.body, katexOptions);
        }, 100);
    }

    renderMathInElement(document.body, katexOptions);

    const observer = new MutationObserver((mutations) => {
        let shouldRender = false;
        mutations.forEach((mutation) => {
            if (mutation.target &&
                mutation.target.className &&
                typeof mutation.target.className === 'string' &&
                mutation.target.className.includes('katex')) {
                return;
            }
            shouldRender = true;
        });

        if (shouldRender) {
            safeRender();
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
    });

    setInterval(() => {
        const text = document.body.innerText;
        if (text.includes('\\(') || text.includes('$$')) {
            safeRender();
        }
    }, 2000);
});
</script>
</head>
<body>

<div id="game-container">
    <!-- HUD -->
    <div id="hud">
        <div class="stat-box">
            <div class="stat-label">分数</div>
            <div id="score-val" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">生命值</div>
            <div id="health-val" class="stat-value">❤❤❤</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">等级</div>
            <div id="level-val" class="stat-value">1</div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Start Overlay -->
        <div id="start-screen" class="overlay">
            <h1>符号保卫战</h1>
            <p>数据正在通过代码流转！你需要切换正确的<b>“传送门”</b>方向。<br><br>
               当看到 <span class="key-tip">cout</span> 时，使用 <span class="key-tip">&lt;&lt;</span> (流出到屏幕)<br>
               当看到 <span class="key-tip">cin</span> 时，使用 <span class="key-tip">&gt;&gt;</span> (流入到变量)
            </p>
            <button class="start-btn" onclick="startGame()">开始同步数据</button>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over-screen" class="overlay hidden">
            <h1 id="end-title">连接中断</h1>
            <p id="end-msg">你的代码流由于符号错误崩溃了。</p>
            <div style="margin-bottom: 20px;">
                <div class="stat-label">最终得分</div>
                <div id="final-score" class="stat-value" style="font-size: 48px;">0</div>
            </div>
            <button class="start-btn" onclick="startGame()">重启系统</button>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls">
        <div class="instruction-text">点击下方按钮或对应的传送门改变方向</div>
        <div class="btn-group">
            <button id="btn-left" class="action-btn" onclick="setPortal('<<')">&lt;&lt;</button>
            <button id="btn-right" class="action-btn" onclick="setPortal('>>')">&gt;&gt;</button>
        </div>
    </div>
</div>

<script type="application/json" id="widget-config">
{
  "type": "game",
  "gameType": "action",
  "scoring": {
    "correctPoints": 10,
    "speedBonus": 5
  }
}
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-val');
    const healthEl = document.getElementById('health-val');
    const levelEl = document.getElementById('level-val');
    
    // Game State
    let gameActive = false;
    let score = 0;
    let health = 3;
    let level = 1;
    let portalDir = '<<'; // '<<' or '>>'
    let items = [];
    let lastSpawnTime = 0;
    let spawnRate = 2500; // ms
    let itemSpeed = 2;
    let animationFrameId;
    let particles = [];

    // Resize canvas
    function resize() {
        const wrapper = document.getElementById('canvas-wrapper');
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Classes
    class Item {
        constructor(type) {
            this.type = type; // 'cin' or 'cout'
            this.label = type === 'cin' ? 'cin' : 'cout';
            this.varName = ['age', 'name', 'score', 'x', 'y', 'data', 'buffer'][Math.floor(Math.random() * 7)];
            this.width = 120;
            this.height = 40;
            this.x = canvas.width + 50;
            this.y = canvas.height / 2 - this.height / 2;
            this.targetX = canvas.width * 0.5; // The center portal
            this.passed = false;
            this.speed = itemSpeed + (Math.random() * 0.5);
        }

        update() {
            this.x -= this.speed;
            
            // Collision check with center portal
            if (!this.passed && this.x <= this.targetX + 40) {
                this.checkMatch();
                this.passed = true;
            }
        }

        checkMatch() {
            const correct = (this.type === 'cout' && portalDir === '<<') || 
                          (this.type === 'cin' && portalDir === '>>');
            
            if (correct) {
                const bonus = Math.floor((this.speed) * 2);
                updateScore(10 + bonus);
                createParticles(this.targetX, canvas.height/2, '#3b82f6');
                showFeedback("+10", this.targetX, canvas.height/2 - 50);
            } else {
                updateHealth(-1);
                createParticles(this.targetX, canvas.height/2, '#ff3e3e');
                showFeedback("ERROR", this.targetX, canvas.height/2 - 50);
            }
        }

        draw() {
            ctx.save();
            // Draw connector line
            ctx.strokeStyle = this.passed ? (this.matched ? '#3b82f6' : '#ff3e3e') : '#cbd5e1';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(this.x, this.y + this.height/2);
            ctx.lineTo(this.x + 200, this.y + this.height/2);
            ctx.stroke();

            // Draw stream type box
            ctx.fillStyle = this.type === 'cin' ? '#8b5cf6' : '#3b82f6';
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.fillStyle;
            
            // Rounded rect
            ctx.beginPath();
            ctx.roundRect(this.x - 60, this.y, 60, this.height, 5);
            ctx.fill();

            // Variable box
            ctx.fillStyle = '#f8fafc';
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(this.x + 40, this.y, 70, this.height, 5);
            ctx.fill();
            ctx.stroke();

            // Text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(this.label, this.x - 30, this.y + 25);

            ctx.fillStyle = '#475569';
            ctx.font = '14px monospace';
            ctx.fillText(this.varName, this.x + 75, this.y + 25);

            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.alpha = 1;
            this.size = Math.random() * 4 + 2;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    // Canvas click listener to toggle portal
    canvas.addEventListener('mousedown', (e) => {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        // If clicking near center
        if (Math.abs(x - canvas.width/2) < 100) {
            togglePortal();
        }
    });

    function togglePortal() {
        portalDir = (portalDir === '<<' ? '>>' : '<<');
    }

    window.setPortal = (dir) => {
        portalDir = dir;
    };

    function updateScore(pts) {
        score += pts;
        scoreEl.innerText = score;
        if (score > level * 100) {
            level++;
            levelEl.innerText = level;
            itemSpeed += 0.5;
            spawnRate = Math.max(800, spawnRate - 200);
            checkAchievements();
        }
    }

    function updateHealth(delta) {
        health += delta;
        let hearts = "";
        for(let i=0; i<3; i++) hearts += i < health ? "❤" : "🖤";
        healthEl.innerText = hearts;
        if (health <= 0) gameOver();
    }

    function createParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function showFeedback(text, x, y) {
        const el = document.createElement('div');
        el.className = 'feedback-hit';
        el.innerText = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        document.getElementById('canvas-wrapper').appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function checkAchievements() {
        let msg = "";
        if (level === 2) msg = "🔓 解锁：代码新人";
        if (level === 5) msg = "🔓 解锁：流控制大师";
        if (level === 10) msg = "🔓 解锁：C++ 守护者";
        
        if (msg) {
            const popup = document.createElement('div');
            popup.id = 'achievement-popup';
            popup.innerText = msg;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 2000);
        }
    }

    function spawnItem() {
        const type = Math.random() > 0.5 ? 'cin' : 'cout';
        items.push(new Item(type));
    }

    function drawPortal() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Draw static machine base
        ctx.fillStyle = '#e2e8f0';
        ctx.beginPath();
        ctx.roundRect(centerX - 40, centerY - 60, 80, 120, 10);
        ctx.fill();
        ctx.strokeStyle = portalDir === '<<' ? '#3b82f6' : '#6366f1';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = ctx.strokeStyle;

        // Draw the arrows
        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(portalDir, centerX, centerY + 10);

        ctx.shadowBlur = 0;

        // Labels above machine
        ctx.font = '10px monospace';
        ctx.fillStyle = '#64748b';
        ctx.fillText("SYMBOL GATE", centerX, centerY - 45);
    }

    function gameLoop(timestamp) {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw background grid
        ctx.strokeStyle = 'rgba(37, 99, 235, 0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for (let i = 0; i < canvas.height; i += 40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Handle Spawning
        if (timestamp - lastSpawnTime > spawnRate) {
            spawnItem();
            lastSpawnTime = timestamp;
        }

        // Handle Items
        for (let i = items.length - 1; i >= 0; i--) {
            items[i].update();
            items[i].draw();
            if (items[i].x < -100) items.splice(i, 1);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        drawPortal();

        animationFrameId = requestAnimationFrame(gameLoop);
    }

    window.startGame = () => {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        
        // Reset state
        score = 0;
        health = 3;
        level = 1;
        items = [];
        particles = [];
        itemSpeed = 2.5;
        spawnRate = 2500;
        lastSpawnTime = performance.now();
        gameActive = true;
        
        updateScore(0);
        updateHealth(0);
        levelEl.innerText = "1";
        
        // Give player a 3 second grace period before first spawn
        lastSpawnTime += 1000; 

        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(gameLoop);
    };

    function gameOver() {
        gameActive = false;
        document.getElementById('game-over-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        // High score persistence
        const best = localStorage.getItem('symbol_defense_high_score') || 0;
        if (score > best) {
            localStorage.setItem('symbol_defense_high_score', score);
            document.getElementById('end-title').innerText = "🎉 新纪录！";
        } else {
            document.getElementById('end-title').innerText = "系统崩溃";
        }
    }
});
</script>
</body>
</html>
