<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级打字 - SUPER TYPING [VER 2.4]</title>
    <style>
        /* ================= 极客线框风格：IDE 极简美学 ================= */
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --gray: #888888;
            --light-gray: #f0f0f0;
            --error: #cf222e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--light-gray);
            font-family: 'Consolas', 'Courier New', monospace;
            color: var(--fg);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; user-select: none;
        }

        #game-container {
            position: relative; width: 520px; height: 800px;
            background: var(--bg);
            border: 2px solid var(--fg);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* ================= 首页：极简线框磁贴 ================= */
        .home-screen {
            padding: 40px 30px;
            display: flex; flex-direction: column;
            height: 100%; box-sizing: border-box;
        }
        .home-screen h1 {
            text-align: left; font-size: 2.5rem; margin: 0 0 40px 0;
            letter-spacing: 2px; font-weight: 900;
            border-bottom: 4px solid var(--fg); display: inline-block;
        }
        
        .tile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px; background: var(--fg);
            border: 1px solid var(--fg);
            flex: 1;
        }

        .tile {
            background: var(--bg);
            padding: 20px; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: flex-start;
            cursor: pointer; transition: background 0.1s;
            position: relative;
        }
        .tile:hover { background: var(--fg); color: var(--bg); }
        .tile:hover .tile-desc { color: var(--bg); }
        .tile:hover::before { content: '>'; position: absolute; right: 20px; bottom: 20px; font-size: 1.5rem; font-weight: bold; }

        .tile-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .tile-desc { font-size: 0.85rem; color: var(--gray); line-height: 1.4; }

        /* ================= 游戏内 HUD ================= */
        .hud {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 15px 20px; border-bottom: 1px solid var(--fg);
            display: flex; justify-content: space-between; z-index: 10;
            background: var(--bg); font-size: 0.9rem;
        }
        .hud-left { display: flex; flex-direction: column; gap: 3px; }
        .hud-right { text-align: right; }
        .stat-val { font-weight: bold; color: var(--fg); }
        .stat-label { color: var(--gray); margin-right: 5px; }

        /* ================= 中心连击特效 ================= */
        #combo-popup {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: 900; color: var(--fg);
            pointer-events: none; z-index: 50; opacity: 0;
            white-space: nowrap; font-style: italic;
        }
        @keyframes combo-hit {
            0% { transform: translate(-50%, -40%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -70%) scale(1); opacity: 0; }
        }
        .animate-combo { animation: combo-hit 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* ================= 掉落元素 ================= */
        .play-area { position: relative; width: 100%; height: 100%; z-index: 5; }
        .target {
            position: absolute; min-width: 50px; height: 50px; padding: 0 15px;
            box-sizing: border-box; background: var(--bg); border: 2px solid var(--fg);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; color: var(--fg);
            font-family: 'Consolas', monospace; white-space: nowrap; z-index: 6;
        }
        .target.locked { background: var(--fg); color: var(--bg); transform: scale(1.1); z-index: 7; }
        
        /* 空格视觉化样式 */
        .space-char { color: var(--gray); font-weight: normal; margin: 0 2px; }
        .char-typed { opacity: 0.2; text-decoration: line-through; }
        
        .error-shake { animation: errShake 0.2s; border-color: var(--error) !important; color: var(--error) !important; background: var(--bg) !important; }
        @keyframes errShake { 
            0%, 100% { transform: scale(1.1) translateX(0); } 
            25% { transform: scale(1.1) translateX(-4px); } 
            75% { transform: scale(1.1) translateX(4px); } 
        }

        .overlay {
            position: absolute; inset: 0; background: var(--bg);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; padding: 40px;
        }
        .overlay h2 { font-size: 2.5rem; margin-bottom: 10px; border-bottom: 5px solid var(--fg); }
        .overlay p { text-align: center; margin-bottom: 30px; font-weight: bold; }
        
        .btn {
            padding: 15px 30px; background: var(--bg); border: 2px solid var(--fg);
            font-family: inherit; font-weight: bold; cursor: pointer; margin: 10px;
        }
        .btn:hover { background: var(--fg); color: var(--bg); }

        .hurt-flash { position: absolute; inset: 0; background: var(--fg); pointer-events: none; opacity: 0; z-index: 200; }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-5px)} 75% {transform:translateX(5px)} }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="homeScreen" class="home-screen">
            <h1>超级打字</h1>
            <div class="tile-grid">
                <div class="tile" onclick="startMode('simple')">
                    <div class="tile-title">简单模式</div>
                    <div class="tile-desc">纯字母 + 数字<br>[限时积分]</div>
                </div>
                <div class="tile" onclick="startMode('breakthrough')">
                    <div class="tile-title">闯关模式</div>
                    <div class="tile-desc">第1-5关卡递进<br>[阶段特训]</div>
                </div>
                <div class="tile" onclick="startMode('cpp')">
                    <div class="tile-title">C++ 挑战</div>
                    <div class="tile-desc">关键字 + 符号<br>[生存考验]</div>
                </div>
                <div class="tile" onclick="startMode('endless')">
                    <div class="tile-title">无尽模式</div>
                    <div class="tile-desc">全字符综合测试<br>[极限竞技]</div>
                </div>
            </div>
        </div>

        <div id="gameHud" class="hud hidden">
            <div class="hud-left">
                <div><span class="stat-label" id="labelMain">得分:</span><span id="valMain" class="stat-val">0</span></div>
                <div id="boxLevel"><span class="stat-label">关卡:</span><span id="valLevel" class="stat-val">1</span></div>
            </div>
            <div class="hud-right">
                <div id="boxHp"><span class="stat-label">装甲:</span><span id="valHp" class="stat-val">♥♥♥♥♥</span></div>
                <div id="boxTime" class="hidden"><span class="stat-label">时间:</span><span id="valTime" class="stat-val">60s</span></div>
                <div style="font-size:0.7rem; margin-top:5px; color:#888;">间隔: <span id="valInterval">1500</span>ms / 速度: <span id="valSpeed">1.0</span>x</div>
            </div>
        </div>

        <div id="combo-popup"></div>
        <div id="hurtOverlay" class="hurt-flash"></div>
        <div id="playArea" class="play-area"></div>

        <div id="resultOverlay" class="overlay hidden">
            <h2 id="resTitle">完成</h2>
            <p id="resDesc">正在生成战报...</p>
            <div>
                <button id="resActionBtn" class="btn">重新挑战</button>
                <button onclick="location.reload()" class="btn">返回主菜单</button>
            </div>
        </div>
    </div>

    <script>
        // =============== 配置与字典 ===============
        const DIC = {
            letters: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),
            numbers: "0123456789".split(""),
            symbols: [".","~", "^", "#","{", "}", "(", ")", "[", "]", "<", ">", ";", "_", "=", "+", "-", "*", "/", "&", "|", "!"],
            keywords: [
                "include", "bits", "stdc++.h", "using", "namespace", "std", "main", "int", "float", "double", "long long", "char",
				"return","define", "cin", "cout", "scanf", "printf", "endl", "bool", "void", "nullptr_t", "signed", "unsigned", "const",
				"new", "delete", "if", "else", "else if", "switch", "case", "default", "for", "while", "do while", "break", "continue",
				"struct", "union", "class", "public", "freopen", "vector", "array", "deque", "list", "set", "map", "multimap", "unordered_map",
				"unordered_set", "stack", "queue", "priority_queue", "begin", "end", "size", "empty", "swap", "clear", "clear", "insert", "erase",
				"front", "back", "fill", "count", "lower_bound", "upper_bound", "auto", "pop", "push", "top", "find", "reverse", "unique", "sort",
				"stable_sort","binary_search", "lower_bound", "upper_bound", "bitset", "string", "pair", "max", "min", "abs", "fabs", "sqrt", "pow",
				"ceil", "floor", "round", "log", "exp", "sin", "cos", "tan", "__gcd", "__lcm", "length", "substr", "memset",
				"tolower", "getline", "rand", "srand", ""
            ]
        };

        const LEVELS = [
            { name: "第1关：基础字母", target: 20, time: 60, speed: 1.0, interval: 1500, pool: ['letters'] },
            { name: "第2关：数字协同", target: 25, time: 60, speed: 1.1, interval: 1400, pool: ['letters', 'numbers'] },
            { name: "第3关：符号突围", target: 25, time: 60, speed: 1.1, interval: 1300, pool: ['symbols'] },
            { name: "第4关：代码语法", target: 20, time: 60, speed: 1.0, interval: 1500, pool: ['keywords'] },
            { name: "第5关：终极试炼", target: 35, time: 60, speed: 1.2, interval: 1200, pool: ['letters', 'symbols', 'keywords'] }
        ];

        // =============== 音效 (Web Audio) ===============
        let audioCtx;
        function initAudioEngine() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function beep(freq, dur, type='square') {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
        }

        // =============== 状态变量 ===============
        let S = {
            active: false, mode: '', score: 0, hp: 5, combo: 0,
            timer: 60, hitCount: 0, levelIdx: 0,
            speed: 1.0, interval: 1500,
            targets: [], locked: null, lastSpawn: 0, lastTick: 0
        };

        // =============== 模式切换 ===============
        function startMode(m, targetLevel = 0) {
            initAudioEngine();
            S.active = true; S.mode = m; S.score = 0; S.hp = 5; S.combo = 0;
            S.targets = []; S.locked = null;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('gameHud').classList.remove('hidden');
            document.getElementById('resultOverlay').classList.add('hidden');
            document.getElementById('playArea').innerHTML = '';
            
            if(m === 'breakthrough') {
                document.getElementById('boxLevel').classList.remove('hidden');
            } else {
                document.getElementById('boxLevel').classList.add('hidden');
            }

            if(m === 'simple' || m === 'breakthrough') {
                document.getElementById('boxHp').classList.add('hidden');
                document.getElementById('boxTime').classList.remove('hidden');
                // 中文化：得分和进度
                document.getElementById('labelMain').innerText = (m==='simple'?'得分:':'进度:');
                if(m==='breakthrough') {
                    initLevel(targetLevel); 
                } else { 
                    S.timer=60; S.speed=1.0; S.interval=1500; 
                }
            } else {
                document.getElementById('boxHp').classList.remove('hidden');
                document.getElementById('boxTime').classList.add('hidden');
                // 中文化：得分
                document.getElementById('labelMain').innerText = '得分:';
                S.speed=1.0; S.interval=1500;
            }
            S.lastSpawn = S.lastTick = performance.now();
            updateHUD();
            requestAnimationFrame(gameLoop);
        }

        function initLevel(idx) {
            S.levelIdx = idx; const l = LEVELS[idx];
            S.hitCount = 0; S.timer = l.time; S.speed = l.speed; S.interval = l.interval;
        }

        function showComboEffect(n) {
            if(n < 3) return;
            const p = document.getElementById('combo-popup');
            p.innerText = `x${n} 连击！`;
            p.classList.remove('animate-combo');
            void p.offsetWidth;
            p.classList.add('animate-combo');
        }

        function handleLockedError() {
            beep(100, 0.1, 'sawtooth');
            S.combo = 0;
            updateHUD();
            if (S.locked && S.locked.el) {
                S.locked.el.classList.remove('error-shake');
                void S.locked.el.offsetWidth;
                S.locked.el.classList.add('error-shake');
            }
        }

        // =============== 游戏逻辑 ===============
        function gameLoop(time) {
            if(!S.active) return;
            if(time - S.lastSpawn > S.interval) { spawn(); S.lastSpawn = time; }
            if(time - S.lastTick > 1000) {
                if(S.mode==='simple' || S.mode==='breakthrough') { S.timer--; if(S.timer<=0) checkFinish(); }
                S.lastTick = time; updateHUD();
            }
            for(let i=S.targets.length-1; i>=0; i--) {
                let t = S.targets[i]; t.y += S.speed; t.el.style.top = t.y + "px";
                if(t.y > 750) handleCrash(i);
            }
            requestAnimationFrame(gameLoop);
        }

        function spawn() {
            let content = getRand();
            const el = document.createElement('div'); el.className = 'target';
            if(content.type === 'word') {
                for(let c of content.text) { 
                    let s = document.createElement('span'); 
                    if(c === ' ') {
                        s.innerText = '␣';
                        s.className = 'space-char';
                    } else {
                        s.innerText = c; 
                    }
                    el.appendChild(s); 
                }
            } else { el.innerText = content.text; }
            
            const w = content.type==='word' ? content.text.length*12+30 : 50;
            const x = Math.random()*(480-w)+10; el.style.left = x+"px"; el.style.top = "-50px";
            document.getElementById('playArea').appendChild(el);
            S.targets.push({ el, text: content.text, type: content.type, idx: 0, x, y: -50 });
        }

        function getRand() {
            let pool = [];
            if(S.mode==='simple') pool = DIC.letters.concat(DIC.numbers);
            else if(S.mode==='cpp') pool = DIC.keywords.concat(DIC.symbols);
            else if(S.mode==='breakthrough') LEVELS[S.levelIdx].pool.forEach(p=>pool=pool.concat(DIC[p]));
            else { 
                let r = Math.random(); 
                if(r < 0.15) return {type:'word', text:DIC.keywords[Math.floor(Math.random()*DIC.keywords.length)]};
                pool = DIC.letters.concat(DIC.symbols);
            }
            let res = pool[Math.floor(Math.random()*pool.length)];
            return res.length > 1 ? {type:'word', text:res} : {type:'char', text:res};
        }

        // =============== 交互判定 ===============
        window.addEventListener('keydown', e => {
            if(!S.active || ['Shift','Control','Alt','Meta','CapsLock'].includes(e.key)) return;
            initAudioEngine();

            if(S.locked) {
                if(e.key === S.locked.text[S.locked.idx]) {
                    beep(800, 0.05); 
                    S.locked.el.classList.remove('error-shake');
                    S.locked.el.children[S.locked.idx].classList.add('char-typed');
                    S.locked.idx++; 
                    if(S.locked.idx === S.locked.text.length) finalize(S.targets.indexOf(S.locked));
                } else {
                    handleLockedError();
                }
                return;
            }

            let found = -1, maxY = -100;
            for(let i=0; i<S.targets.length; i++) {
                if(S.targets[i].text[0] === e.key && S.targets[i].y > maxY) { maxY = S.targets[i].y; found = i; }
            }

            if(found !== -1) {
                const t = S.targets[found];
                if(t.type === 'char') { beep(800, 0.05); finalize(found); }
                else { 
                    beep(600, 0.05); S.locked = t; t.el.classList.add('locked'); 
                    t.el.children[0].classList.add('char-typed'); t.idx = 1; 
                }
            } else {
                beep(100, 0.1, 'sawtooth'); S.combo = 0; updateHUD();
            }
        });

        function finalize(i) {
            const t = S.targets[i]; 
            t.el.classList.remove('locked', 'error-shake');
            t.el.classList.add('explode');
            
            S.combo++; showComboEffect(S.combo);
            
            if(S.mode==='breakthrough') { 
                S.hitCount++; if(S.hitCount >= LEVELS[S.levelIdx].target) checkFinish(); 
            } else {
                let b = t.type==='word' ? t.text.length*15 : 10; 
                S.score += Math.floor(b*(1+S.combo*0.05));
                if(S.mode==='endless' || S.mode==='cpp') { 
                    // 1. 速度控制：最高速度降至 1.8，且需要打满 16000 分才会满速
                    S.speed = Math.min(1.8, 1.0 + S.score / 20000); 
                    
                    // 2. 间隔控制：最快间隔降至 1100ms，每 1000 分才减少 20ms
                    S.interval = Math.max(1100, 1500 - S.score * 0.02); 
                }
            }
            updateHUD();
            setTimeout(() => { if(t.el.parentNode) t.el.parentNode.removeChild(t.el); }, 150);
            S.targets.splice(i, 1); S.locked = null;
        }

        function handleCrash(i) {
            const t = S.targets[i]; if(t.el.parentNode) t.el.parentNode.removeChild(t.el);
            S.targets.splice(i, 1); 
            if(S.locked === t) S.locked = null; 
            S.combo = 0; 
            if(S.mode==='cpp' || S.mode==='endless') {
                S.hp--; beep(50, 0.3, 'sawtooth'); flash();
                if(S.hp <= 0) finish("装甲损毁", `最终得分: ${S.score}`);
            }
            updateHUD();
        }

        // =============== UI 辅助 ===============
        function updateHUD() {
            document.getElementById('valMain').innerText = (S.mode==='breakthrough'? `${S.hitCount}/${LEVELS[S.levelIdx].target}` : S.score);
            document.getElementById('valLevel').innerText = S.levelIdx + 1;
            document.getElementById('valTime').innerText = S.timer + "s";
            document.getElementById('valHp').innerText = "♥".repeat(Math.max(0, S.hp));
            document.getElementById('valInterval').innerText = Math.round(S.interval);
            document.getElementById('valSpeed').innerText = S.speed.toFixed(2);
        }

        function flash() {
            const o = document.getElementById('hurtOverlay'); o.style.opacity = 0.5; setTimeout(()=>o.style.opacity=0, 100);
            const c = document.getElementById('game-container'); c.classList.add('shake'); setTimeout(()=>c.classList.remove('shake'), 200);
        }

        function finish(title, desc) {
            S.active = false;
            document.getElementById('resTitle').innerText = title;
            document.getElementById('resDesc').innerText = desc;
            
            document.getElementById('resActionBtn').innerText = "重新挑战";
            document.getElementById('resActionBtn').onclick = () => startMode(S.mode, S.levelIdx);
            document.getElementById('resultOverlay').classList.remove('hidden');
        }

        function checkFinish() {
            if(S.mode==='simple') finish("时间耗尽", `总得分: ${S.score}`);
            else if(S.mode==='breakthrough') {
                if(S.hitCount >= LEVELS[S.levelIdx].target) {
                    if(S.levelIdx >= LEVELS.length - 1) {
                        finish("全关卡通关", "恭喜！你已完成所有特训关卡。");
                    } else {
                        S.active = false;
                        document.getElementById('resTitle').innerText = "挑战成功";
                        document.getElementById('resDesc').innerText = `即将进入: ${LEVELS[S.levelIdx+1].name}`;
                        
                        document.getElementById('resActionBtn').innerText = "进入下一关";
                        document.getElementById('resActionBtn').onclick = () => { startMode('breakthrough', S.levelIdx + 1); };
                        document.getElementById('resultOverlay').classList.remove('hidden');
                    }
                } else finish("挑战失败", "未能在规定时间内达到目标。");
            }
        }
    </script>
</body>
</html>
