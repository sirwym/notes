<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级打字 - SUPER TYPING [VER 3.3 智能提示版]</title>
    <style>
        /* ================= 极客线框风格：IDE 极简美学 ================= */
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --gray: #888888;
            --light-gray: #f0f0f0;
            --error: #cf222e;
            --success: #0969da;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--light-gray);
            font-family: 'Consolas', 'Courier New', monospace;
            color: var(--fg);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; user-select: none;
        }

        #game-container {
            position: relative; width: 520px; height: 800px;
            background: var(--bg);
            border: 2px solid var(--fg);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* ================= 首页：极简线框磁贴 ================= */
        .home-screen {
            padding: 30px 25px;
            display: flex; flex-direction: column;
            height: 100%; box-sizing: border-box;
        }
        .home-screen h1 {
            text-align: left; font-size: 2.2rem; margin: 0 0 20px 0;
            letter-spacing: 2px; font-weight: 900;
            border-bottom: 4px solid var(--fg); display: inline-block;
        }
        
        .tile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px; background: var(--fg);
            border: 1px solid var(--fg);
            flex: 1;
        }

        .tile {
            background: var(--bg);
            padding: 12px 15px; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: flex-start;
            position: relative;
        }
        
        .tile-normal { cursor: pointer; transition: background 0.1s; }
        .tile-normal:hover { background: var(--fg); color: var(--bg); }
        .tile-normal:hover .tile-desc { color: var(--light-gray); }
        .tile-normal:hover::before { content: '>'; position: absolute; right: 15px; bottom: 15px; font-size: 1.5rem; font-weight: bold; }

        /* 组合卡片（练习/挑战） */
        .prac-btns {
            display: flex; flex-direction: column; width: 100%; gap: 5px; 
            margin-top: 10px; position: relative; z-index: 10;
        }
        .btn-sub {
            background: var(--bg); color: var(--fg); border: 1px solid var(--fg); 
            padding: 5px 0; font-family: inherit; font-size: 0.8rem; font-weight: bold; 
            cursor: pointer; transition: background 0.1s; width: 100%;
        }
        .btn-sub:hover { background: var(--fg); color: var(--bg); }

        .tile-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 3px; text-transform: uppercase; }
        .tile-desc { font-size: 0.75rem; color: var(--gray); line-height: 1.3; }

        /* ================= 游戏内 HUD ================= */
        .hud {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 15px 20px; border-bottom: 1px solid var(--fg);
            display: flex; justify-content: space-between; z-index: 10;
            background: var(--bg); font-size: 0.9rem;
        }
        .hud-left { display: flex; flex-direction: column; gap: 3px; }
        .hud-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
        .stat-val { font-weight: bold; color: var(--fg); }
        .stat-label { color: var(--gray); margin-right: 5px; }

        /* ================= 中心连击特效 ================= */
        #combo-popup {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: 900; color: var(--fg);
            pointer-events: none; z-index: 50; opacity: 0;
            white-space: nowrap; font-style: italic;
        }
        @keyframes combo-hit {
            0% { transform: translate(-50%, -40%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -70%) scale(1); opacity: 0; }
        }
        .animate-combo { animation: combo-hit 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* ================= 掉落元素 ================= */
        .play-area { position: relative; width: 100%; height: 100%; z-index: 5; }
        .target {
            position: absolute; min-width: 50px; height: 50px; padding: 0 15px;
            box-sizing: border-box; background: var(--bg); border: 2px solid var(--fg);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; color: var(--fg);
            font-family: 'Consolas', monospace; white-space: nowrap; z-index: 6;
        }
        
        /* 智能提示角标特效 */
        .target[data-hint]::after {
            content: attr(data-hint);
            position: absolute;
            top: 2px;
            right: 3px;
            font-size: 0.55rem;
            color: #aaaaaa;
            font-weight: normal;
            font-family: 'Microsoft YaHei', sans-serif;
            pointer-events: none;
        }
        
        /* 增强型锁定样式：置顶并加入阴影，防止单词重叠看不清 */
        .target.locked { 
            background: var(--fg) !important; color: var(--bg) !important; 
            transform: scale(1.15); z-index: 999; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .target.locked .space-char { color: #666; }
        .target.locked[data-hint]::after { color: #666666; } /* 锁定时角标变暗适应黑底 */
        
        .space-char { color: var(--gray); font-weight: normal; margin: 0 2px; }
        .char-typed { opacity: 0.2; text-decoration: line-through; }
        
        .error-shake { animation: errShake 0.2s; border-color: var(--error) !important; color: var(--error) !important; background: var(--bg) !important; }
        @keyframes errShake { 
            0%, 100% { transform: scale(1.15) translateX(0); } 
            25% { transform: scale(1.15) translateX(-4px); } 
            75% { transform: scale(1.15) translateX(4px); } 
        }

        /* ================= 结算面板 ================= */
        .overlay {
            position: absolute; inset: 0; background: var(--bg);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; padding: 40px;
        }
        .overlay h2 { font-size: 2.5rem; margin-bottom: 20px; border-bottom: 5px solid var(--fg); }
        
        #resStats {
            background: var(--light-gray); padding: 20px; border: 2px solid var(--fg); 
            margin-bottom: 30px; text-align: left; font-size: 1.1rem; line-height: 1.8; width: 100%; box-sizing: border-box;
        }

        .btn {
            padding: 15px 30px; background: var(--bg); border: 2px solid var(--fg);
            font-family: inherit; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1rem;
        }
        .btn:hover { background: var(--fg); color: var(--bg); }

        .hurt-flash { position: absolute; inset: 0; background: var(--error); pointer-events: none; opacity: 0; z-index: 200; }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-5px)} 75% {transform:translateX(5px)} }
        @keyframes flashInfo { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="homeScreen" class="home-screen">
            <h1>超级打字</h1>
            <div class="tile-grid">
                <div class="tile tile-normal" onclick="startMode('breakthrough')">
                    <div class="tile-title">闯关模式</div>
                    <div class="tile-desc">第1-5关卡递进<br>[阶段特训/限时]</div>
                </div>
                
                <div class="tile">
                    <div class="tile-title">C++ 练习</div>
                    <div class="tile-desc">无压力/测速记词</div>
                    <div class="prac-btns">
                        <button onclick="event.stopPropagation(); startMode('cpp_prac', 'simple')" class="btn-sub">简单练习</button>
                        <button onclick="event.stopPropagation(); startMode('cpp_prac', 'hard')" class="btn-sub">困难练习</button>
                        <button onclick="event.stopPropagation(); startMode('cpp_prac', 'all')" class="btn-sub">全阶段练习</button>
                    </div>
                </div>

                <div class="tile">
                    <div class="tile-title">C++ 挑战</div>
                    <div class="tile-desc">生存挑战/损毁警告</div>
                    <div class="prac-btns">
                        <button onclick="event.stopPropagation(); startMode('cpp', 'simple')" class="btn-sub">简单挑战</button>
                        <button onclick="event.stopPropagation(); startMode('cpp', 'hard')" class="btn-sub">困难挑战</button>
                        <button onclick="event.stopPropagation(); startMode('cpp', 'all')" class="btn-sub">全阶段挑战</button>
                    </div>
                </div>

                <div class="tile tile-normal" onclick="startMode('endless')">
                    <div class="tile-title">无尽模式</div>
                    <div class="tile-desc">全字符综合测试<br>[极限竞技]</div>
                </div>
            </div>
        </div>

        <div id="gameHud" class="hud hidden">
            <div class="hud-left">
                <div><span class="stat-label" id="labelMain">得分:</span><span id="valMain" class="stat-val">0</span></div>
                <div id="boxLevel"><span class="stat-label">关卡:</span><span id="valLevel" class="stat-val">1</span></div>
            </div>
            <div class="hud-right">
                <div id="boxHp"><span class="stat-label">装甲:</span><span id="valHp" class="stat-val">♥♥♥♥♥</span></div>
                <div id="boxTime" class="hidden"><span class="stat-label">时间:</span><span id="valTime" class="stat-val">60s</span></div>
                
                <div id="boxWPM" class="hidden"><span class="stat-label">速度:</span><span id="valWPM" class="stat-val">0</span> <span style="font-size:0.7rem">WPM</span></div>
                <div id="boxAcc" class="hidden"><span class="stat-label">正确率:</span><span id="valAcc" class="stat-val">100%</span></div>
                <button id="btnEndPrac" class="btn-sub hidden" style="width: auto; padding: 2px 10px; border-color: var(--error); color: var(--error); margin-top: 5px;" onclick="checkFinish()">结束结算 [ESC]</button>
                
                <div style="font-size:0.6rem; margin-top:5px; color:#aaa;">间隔: <span id="valInterval">1500</span>ms / 速度: <span id="valSpeed">1.0</span>x</div>
            </div>
        </div>

        <div id="combo-popup"></div>
        <div id="hurtOverlay" class="hurt-flash"></div>
        <div id="playArea" class="play-area"></div>

        <div id="resultOverlay" class="overlay hidden">
            <h2 id="resTitle">完成</h2>
            <div id="resStats"></div>
            <div style="display: flex; width: 100%; justify-content: center;">
                <button id="resActionBtn" class="btn">再来一次</button>
                <button onclick="location.reload()" class="btn">主菜单</button>
            </div>
        </div>
    </div>

    <script>
        // =============== 配置与分级词典 ===============
        const DIC = {
            letters: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),
            numbers: "0123456789".split(""),
            symbols_basic: ["#", "^", "{", "}", "(", ")", "[", "]", "<", ">", ";", "=", "+", "-", "*", "/", "%"],
            symbols_adv: ["<<", ">>", "==", "!=", "<=", ">=", "&&", "||", "&", "|", "!"],
            cpp_simple: [
                "include", "using", "namespace", "std", "main", "return", 
                "int", "float", "double", "char", "bool", "void",
                "cin", "cout", "endl", "long long", "const",
                "if", "else", "else if", "switch", "case", "default", 
                "for", "while", "do while", "break", "continue", "sqrt",
                "max", "min", "abs", "bits", "stdc++.h", "scanf", "printf",
                "pow", "ceil", "floor","fabs"
            ],
            cpp_hard: [
                "define", "freopen", "getline",
                "signed", "unsigned", "auto", "nullptr_t",
                "struct", "union", "class", "public", "new", "delete", "protected", "private", "operator",
                "vector", "array", "deque", "list", "set", "map", "multimap", "multiset",
                "unordered_map", "unordered_set", "stack", "queue", "priority_queue", 
                "bitset", "string", "pair","forward_list","unordered_multimap","unordered_multiset",
                "begin", "end", "size", "empty", "clear", "insert", "erase", 
                "front", "back", "pop", "push", "top", "length", "substr",
                "swap", "fill", "count", "find", "reverse", "unique", "sort", 
                "stable_sort", "binary_search", "lower_bound", "upper_bound", 
                "memset", "tolower",
                "rand", "srand","round", "log", "exp", "sin", "cos", "tan", "__gcd", "__lcm"
            ]
        };
        DIC.symbols = DIC.symbols_basic.concat(DIC.symbols_adv);
        DIC.cpp_all = DIC.cpp_simple.concat(DIC.cpp_hard);

        const LEVELS = [
            { name: "第1关：基础字母", target: 20, time: 60, speed: 1.0, interval: 1500, pool: ['letters'] },
            { name: "第2关：数字协同", target: 25, time: 60, speed: 1.1, interval: 1400, pool: ['letters', 'numbers'] },
            { name: "第3关：符号突围", target: 25, time: 60, speed: 1.1, interval: 1300, pool: ['symbols'] },
            { name: "第4关：基础语法", target: 25, time: 60, speed: 1.0, interval: 1500, pool: ['cpp_simple'] },
            { name: "第5关：终极试炼", target: 35, time: 60, speed: 1.2, interval: 1200, pool: ['cpp_all', 'symbols'] }
        ];

        const STORAGE_KEY = 'superTyping_records_v3.3';
        function getRecords() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; } }
        function saveAndCheckRecord(modeKey, wpm, acc, score) {
            let records = getRecords();
            if (!records[modeKey]) records[modeKey] = { bestWPM: 0, bestAcc: 0, bestScore: 0 };
            let isNewRecord = false; let hist = records[modeKey];
            if (modeKey.includes('prac')) {
                if (wpm > hist.bestWPM || (wpm === hist.bestWPM && acc > hist.bestAcc)) {
                    hist.bestWPM = wpm; hist.bestAcc = acc; isNewRecord = true;
                }
            } else {
                if (score > hist.bestScore) { hist.bestScore = score; isNewRecord = true; }
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            return { isNewRecord, bestWPM: hist.bestWPM, bestAcc: hist.bestAcc, bestScore: hist.bestScore };
        }

        let audioCtx;
        function initAudioEngine() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function beep(freq, dur, type='square') {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
        }

        let S = {
            active: false, mode: '', subMode: '', score: 0, hp: 5, combo: 0,
            timer: 60, hitCount: 0, levelIdx: 0,
            speed: 1.0, interval: 1500,
            targets: [], locked: null, lastSpawn: 0, lastTick: 0,
            totalKeys: 0, correctKeys: 0, startTime: 0, lastFrameTime: 0
        };

        function startMode(m, sub = '') {
            initAudioEngine();
            S.active = true; S.mode = m; S.subMode = sub; S.score = 0; S.hp = 5; S.combo = 0;
            S.targets = []; S.locked = null; S.totalKeys = 0; S.correctKeys = 0; S.startTime = performance.now();
            
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('gameHud').classList.remove('hidden');
            document.getElementById('resultOverlay').classList.add('hidden');
            document.getElementById('playArea').innerHTML = '';
            
            document.getElementById('boxLevel').classList.toggle('hidden', m !== 'breakthrough');
            document.getElementById('btnEndPrac').classList.toggle('hidden', m !== 'cpp_prac');
            document.getElementById('boxWPM').classList.toggle('hidden', m !== 'cpp_prac');
            document.getElementById('boxAcc').classList.toggle('hidden', m !== 'cpp_prac');
            document.getElementById('boxHp').classList.toggle('hidden', m === 'cpp_prac' || m === 'breakthrough');
            document.getElementById('boxTime').classList.toggle('hidden', m !== 'breakthrough');

            if(m === 'breakthrough') {
                S.levelIdx = (sub !== '') ? parseInt(sub) : 0; 
                document.getElementById('labelMain').innerText = '进度:';
                initLevel(S.levelIdx); 
            } else if (m === 'cpp_prac') {
                document.getElementById('labelMain').innerText = '按键:';
                S.speed=1.0; S.interval=1500; 
            } else { 
                document.getElementById('labelMain').innerText = '得分:';
                S.speed=1.0; S.interval=1500;
            }

            S.lastSpawn = S.lastTick = performance.now();
            updateHUD();
            requestAnimationFrame(gameLoop);
        }

        function initLevel(idx) {
            S.levelIdx = idx; const l = LEVELS[idx];
            S.hitCount = 0; S.timer = l.time; S.speed = l.speed; S.interval = l.interval;
        }

        function gameLoop(time) {
            if(!S.active) return;
            
            // 1. 计算两帧之间经过的实际时间 (Delta Time)
            if (!S.lastFrameTime) S.lastFrameTime = time;
            let deltaTime = time - S.lastFrameTime;
            S.lastFrameTime = time;
            
            // 防止玩家切到其他网页后切回来时，经过时间过长导致方块瞬间瞬移坠底
            if (deltaTime > 100) deltaTime = 16.666; 
            
            // 2. 以 60FPS (每帧约 16.666ms) 为基准算出时间缩放系数
            let timeScale = deltaTime / 16.666;

            // 原始的生成和计时逻辑
            if(time - S.lastSpawn > S.interval) { spawn(); S.lastSpawn = time; }
            if(time - S.lastTick > 1000) {
                if(S.mode==='breakthrough') { S.timer--; if(S.timer<=0) checkFinish(); }
                S.lastTick = time; updateHUD();
            }
            
            // 3. 将时间系数乘到速度上，确保各刷新率屏幕下落速度绝对一致！
            for(let i=S.targets.length-1; i>=0; i--) {
                let t = S.targets[i]; 
                t.y += S.speed * timeScale; 
                t.el.style.top = t.y + "px";
                if(t.y > 750) handleCrash(i);
            }
            requestAnimationFrame(gameLoop);
        }

        function spawn() {
            let content = getRand();
            const el = document.createElement('div'); el.className = 'target';
            
            // ======= 智能生成角标提示 =======
            let hint = '';
            if (content.type === 'char') {
                if (/[A-Z]/.test(content.text)) hint = '大';
                else if (/[a-z]/.test(content.text)) hint = '小';
                else if (/[0-9]/.test(content.text)) hint = '数';
                else hint = '符'; 
            } else {
                hint = '词'; 
            }
            if (hint) el.setAttribute('data-hint', hint);
            // ================================

            if(content.type === 'word') {
                for(let c of content.text) { 
                    let s = document.createElement('span'); 
                    if(c === ' ') { s.innerText = '␣'; s.className = 'space-char'; } 
                    else { s.innerText = c; }
                    el.appendChild(s); 
                }
            } else { el.innerText = content.text; }
            const w = content.type==='word' ? content.text.length*12+30 : 50;
            const x = Math.random()*(480-w)+10; el.style.left = x+"px"; el.style.top = "-50px";
            document.getElementById('playArea').appendChild(el);
            S.targets.push({ el, text: content.text, type: content.type, idx: 0, x, y: -50 });
        }

        function getRand() {
			let pool = [];
			if(S.mode === 'cpp' || S.mode === 'cpp_prac') {
				// 简单和困难模式现在都直接合并 DIC.symbols (它包含了基础和复合符号)
				if(S.subMode === 'simple') pool = DIC.cpp_simple.concat(DIC.symbols);
				else if(S.subMode === 'hard') pool = DIC.cpp_hard.concat(DIC.symbols);
				else pool = DIC.cpp_all.concat(DIC.symbols);
			} else if(S.mode === 'breakthrough') {
				LEVELS[S.levelIdx].pool.forEach(p=>pool=pool.concat(DIC[p]));
			} else {
				let r = Math.random(); 
				if(r < 0.15) return {type:'word', text:DIC.cpp_all[Math.floor(Math.random()*DIC.cpp_all.length)]};
				pool = DIC.letters.concat(DIC.numbers).concat(DIC.symbols);
			}
			let res = pool[Math.floor(Math.random()*pool.length)];
			return res.length > 1 ? {type:'word', text:res} : {type:'char', text:res};
		}

        window.addEventListener('keydown', e => {
            // 过滤功能键，防止 Backspace/Enter 等引发扣分
            if(!S.active || ['Process'].includes(e.key) || e.key.length > 1) {
                if(e.key === 'Escape' && S.mode === 'cpp_prac') checkFinish();
                return;
            }
            
            // 防止空格键滚动网页
            if(e.key === ' ') e.preventDefault();
            
            initAudioEngine();
            S.totalKeys++;

            if(S.locked) {
                if(e.key === S.locked.text[S.locked.idx]) {
                    S.correctKeys++; beep(800, 0.05); 
                    S.locked.el.classList.remove('error-shake');
                    S.locked.el.children[S.locked.idx].classList.add('char-typed');
                    S.locked.idx++; 
                    if(S.locked.idx === S.locked.text.length) finalize(S.targets.indexOf(S.locked));
                } else { handleLockedError(); }
                return;
            }

            let found = -1, maxY = -100;
            for(let i=0; i<S.targets.length; i++) {
                if(S.targets[i].text[0] === e.key && S.targets[i].y > maxY) { maxY = S.targets[i].y; found = i; }
            }

            if(found !== -1) {
                S.correctKeys++; const t = S.targets[found];
                if(t.type === 'char') { beep(800, 0.05); finalize(found); }
                else { beep(600, 0.05); S.locked = t; t.el.classList.add('locked'); t.el.children[0].classList.add('char-typed'); t.idx = 1; }
            } else { beep(100, 0.1, 'sawtooth'); S.combo = 0; updateHUD(); }
        });

        function finalize(i) {
            const t = S.targets[i]; t.el.classList.remove('locked', 'error-shake'); t.el.classList.add('explode');
            S.combo++; if(S.combo >= 3) {
                const p = document.getElementById('combo-popup'); p.innerText = `连击 x${S.combo}`;
                p.classList.remove('animate-combo'); void p.offsetWidth; p.classList.add('animate-combo');
            }
            if(S.mode==='breakthrough') { S.hitCount++; if(S.hitCount >= LEVELS[S.levelIdx].target) checkFinish(); } 
            else {
                let b = t.type==='word' ? t.text.length*15 : 10; S.score += Math.floor(b*(1+S.combo*0.05));
				if(S.mode==='endless') { 
					// 极限速度上调至 2.5 (分数达到约 22500 时达到极速)
					S.speed = Math.min(2.5, 1.0 + S.score / 15000); 
					// 生成间隔下探至 800 毫秒 (分数达到 35000 时达到极速)
					S.interval = Math.max(800, 1500 - S.score * 0.02); 
				}
                if(S.mode==='cpp') { S.speed = Math.min(1.2, 1.0 + S.score / 15000); S.interval = Math.max(1300, 1500 - S.score * 0.01); }
            }
            updateHUD();
            setTimeout(() => { if(t.el.parentNode) t.el.parentNode.removeChild(t.el); }, 150);
            S.targets.splice(i, 1); S.locked = null;
        }

        function handleCrash(i) {
            const t = S.targets[i]; if(t.el.parentNode) t.el.parentNode.removeChild(t.el);
            S.targets.splice(i, 1); 
            
            // 坠落元素为锁定的词时，给出明显提示
            if(S.locked === t) {
                S.locked = null;
                beep(150, 0.2, 'sawtooth'); 
            }
            
            S.combo = 0; 
            if(S.mode==='cpp' || S.mode==='endless') {
                S.hp--; beep(50, 0.3, 'sawtooth');
                const o = document.getElementById('hurtOverlay'); o.style.opacity = 0.5; setTimeout(()=>o.style.opacity=0, 100);
                const c = document.getElementById('game-container'); c.classList.add('shake'); setTimeout(()=>c.classList.remove('shake'), 200);
                if(S.hp <= 0) checkFinish();
            }
            updateHUD();
        }

        function handleLockedError() {
            beep(100, 0.1, 'sawtooth'); S.combo = 0; updateHUD();
            if (S.locked && S.locked.el) { S.locked.el.classList.remove('error-shake'); void S.locked.el.offsetWidth; S.locked.el.classList.add('error-shake'); }
        }

        function updateHUD() {
            if(S.mode === 'breakthrough') document.getElementById('valMain').innerText = `${S.hitCount}/${LEVELS[S.levelIdx].target}`;
            else if(S.mode === 'cpp_prac') document.getElementById('valMain').innerText = S.correctKeys;
            else document.getElementById('valMain').innerText = S.score;
            document.getElementById('valLevel').innerText = S.levelIdx + 1;
            document.getElementById('valTime').innerText = S.timer + "s";
            document.getElementById('valHp').innerText = "♥".repeat(Math.max(0, S.hp));
            document.getElementById('valInterval').innerText = Math.round(S.interval);
            document.getElementById('valSpeed').innerText = S.speed.toFixed(2);
            if(S.mode === 'cpp_prac') {
                let acc = S.totalKeys > 0 ? Math.floor((S.correctKeys / S.totalKeys) * 100) : 100;
                document.getElementById('valAcc').innerText = acc + "%";
                let elapsedMin = (performance.now() - S.startTime) / 60000;
                let wpm = elapsedMin > 0.05 ? Math.round((S.correctKeys / 5) / elapsedMin) : 0;
                document.getElementById('valWPM').innerText = wpm;
            }
        }

        function checkFinish() {
            let title = "结算完成", desc = "";
            if (S.mode === 'breakthrough') {
                if (S.hitCount >= LEVELS[S.levelIdx].target) {
                    if (S.levelIdx >= LEVELS.length - 1) title = "全关通关";
                    else {
                        S.active = false;
                        document.getElementById('resTitle').innerText = "过关！";
                        document.getElementById('resStats').innerHTML = `即将进入: ${LEVELS[S.levelIdx+1].name}`;
                        document.getElementById('resActionBtn').innerText = "下一关";
                        document.getElementById('resActionBtn').onclick = () => startMode('breakthrough', S.levelIdx + 1);
                        document.getElementById('resultOverlay').classList.remove('hidden');
                        return;
                    }
                } else title = "挑战失败";
            } else if (S.mode === 'cpp_prac') title = "练习报告";
            else title = "挑战结束";
            doFinish(title, desc);
        }

        function doFinish(title, desc) {
            S.active = false;
            document.getElementById('resTitle').innerText = title;
            let acc = S.totalKeys > 0 ? Math.floor((S.correctKeys / S.totalKeys) * 100) : 100;
            let elapsedMin = (performance.now() - S.startTime) / 60000;
            let wpm = elapsedMin > 0.05 ? Math.round((S.correctKeys / 5) / elapsedMin) : 0;
            let modeKey = S.subMode ? `${S.mode}_${S.subMode}` : S.mode;
            let rec = saveAndCheckRecord(modeKey, wpm, acc, S.score);
            let badge = rec.isNewRecord ? `<span style="background:var(--success); color:var(--bg); padding:2px 8px; font-size:0.8rem; margin-left:10px; border-radius:3px; animation: flashInfo 1s infinite;">新记录!</span>` : '';
            
            let statsHtml = '';
            if (S.mode === 'cpp_prac') {
                statsHtml = `
                    <div>有效击键：<b>${S.correctKeys}</b></div>
                    <div>准确率：<b style="color:${acc>=90?'green':'red'}">${acc}%</b></div>
                    <div>输入速度：<b>${wpm} WPM</b> ${badge}</div>
                    <hr style="border:1px dashed #ccc; margin:15px 0">
                    <div style="font-size:0.9rem; color:#888">个人最佳: ${rec.bestWPM} WPM (${rec.bestAcc}%)</div>
                `;
            } else {
                statsHtml = `
                    <div>最终得分：<b>${S.score}</b> ${badge}</div>
                    <div>准确率：<b>${acc}%</b></div>
                    <hr style="border:1px dashed #ccc; margin:15px 0">
                    <div style="font-size:0.9rem; color:#888">该模式历史最高: ${rec.bestScore}</div>
                `;
            }
            document.getElementById('resStats').innerHTML = statsHtml;
            document.getElementById('resActionBtn').innerText = "再来一次";
            document.getElementById('resActionBtn').onclick = () => startMode(S.mode, S.subMode);
            document.getElementById('resultOverlay').classList.remove('hidden');
        }
    </script>
</body>
</html>
