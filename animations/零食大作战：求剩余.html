<script src="../assets/js/auto-render.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const katexOptions = {
        delimiters: [
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
        ],
        throwOnError: false,
        strict: false,
        trust: true
    };

    let renderTimeout;
    function safeRender() {
        if (renderTimeout) clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => {
            renderMathInElement(document.body, katexOptions);
        }, 100);
    }

    renderMathInElement(document.body, katexOptions);

    const observer = new MutationObserver((mutations) => {
        let shouldRender = false;
        mutations.forEach((mutation) => {
            if (mutation.target &&
                mutation.target.className &&
                typeof mutation.target.className === 'string' &&
                mutation.target.className.includes('katex')) {
                return;
            }
            shouldRender = true;
        });

        if (shouldRender) {
            safeRender();
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
    });

    setInterval(() => {
        const text = document.body.innerText;
        if (text.includes('\\(') || text.includes('$$')) {
            safeRender();
        }
    }, 2000);
});
</script>

<script type="application/json" id="widget-config">
{
  "type": "simulation",
  "concept": "remainder_visualizer",
  "description": "王老师分糖果：理解除法、平均分和余数的物理意义。",
  "variables": [
    { "name": "candy_total", "label": "糖果总数", "min": 1, "max": 40, "default": 13, "unit": "颗" },
    { "name": "friend_count", "label": "小伙伴数量", "min": 2, "max": 10, "default": 4, "unit": "人" }
  ],
  "presets": [
    { "name": "正好分完", "variables": { "candy_total": 12, "friend_count": 4 } },
    { "name": "剩下1颗", "variables": { "candy_total": 13, "friend_count": 4 } },
    { "name": "剩下很多", "variables": { "candy_total": 19, "friend_count": 10 } }
  ]
}
</script>

<!-- Control Panel -->
<aside id="controls" class="w-full md:w-80 bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col shrink-0 overflow-y-auto max-h-[45vh] md:max-h-screen p-4">
    <div class="mb-6">

        <p class="text-sm text-gray-500">王老师带了糖果要平均分给小伙伴，最后剩下几颗呢？</p>
    </div>

    <div class="space-y-6 flex-1">

            </div>

        <!-- 算式显示 -->

                    13 ÷ 4 = <span class="text-blue-600">3</span> ... <span class="text-rose-500">1</span>

        <!-- Presets -->
        <div class="grid grid-cols-1 gap-2 pt-2">

            <div class="flex flex-wrap gap-2">
                <button onclick="applyPreset(12, 4)" class="px-3 py-1.5 text-xs bg-gray-100 hover:bg-gray-200 rounded-full transition-colors">正好分完 (12÷4)</button>
                <button onclick="applyPreset(13, 4)" class="px-3 py-1.5 text-xs bg-gray-100 hover:bg-gray-200 rounded-full transition-colors">剩1颗 (13÷4)</button>
                <button onclick="applyPreset(19, 10)" class="px-3 py-1.5 text-xs bg-gray-100 hover:bg-gray-200 rounded-full transition-colors">大余数 (19÷10)</button>
            </div>

    </div>

    <!-- Actions -->
    <div class="mt-8 space-y-3 pb-4">
        <button id="main-btn" onclick="handleMainAction()" class="w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg btn-primary flex items-center justify-center gap-2">
            <span id="btn-icon">▶</span>
            <span id="btn-text">开始分糖果</span>
        </button>
        <button id="reset-btn" onclick="resetSimulation()" class="w-full py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition-colors">

</aside>

<!-- Canvas Area -->
<main class="flex-1 relative bg-slate-50 overflow-hidden flex flex-col">
    <!-- Canvas -->
    <div class="flex-1 w-full relative">
        <canvas id="sim-canvas" class="w-full h-full"></canvas>
    </div>

    <!-- Summary Overlay (Mobile optimized) -->
    <div id="result-overlay" class="absolute bottom-6 left-4 right-4 bg-white p-4 rounded-2xl shadow-xl border border-blue-100 transform translate-y-32 transition-transform duration-500 z-30 opacity-0 pointer-events-none">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-2xl">🍬</div>
            <div>
                <h3 class="font-bold text-gray-800">分配完毕！</h3>
                <p id="result-text" class="text-sm text-gray-600 leading-tight">每人分到 3 颗，还剩下 1 颗无法平均分。</p>
            </div>
        </div>
    </div>
</main>

<script>
/** 
 * Simulation Core Logic
 */
const canvas = document.getElementById('sim-canvas');
const ctx = canvas.getContext('2d');
const mainBtn = document.getElementById('main-btn');
const btnText = document.getElementById('btn-text');
const btnIcon = document.getElementById('btn-icon');
const equationView = document.getElementById('equation-view');
const resultOverlay = document.getElementById('result-overlay');
const resultText = document.getElementById('result-text');

let state = {
    running: false,
    paused: false,
    ended: false,
    candy_total: 13,
    friend_count: 4,
    candies: [], // {x, y, targetX, targetY, size, color, alpha, assigned: bool, friendIndex: -1}
    friends: [], // {x, y, w, h, candyCount: 0}
    animationSpeed: 0.08,
    lastUpdate: 0,
    currentIndex: 0, // Which candy is currently flying
    distributionStep: 0, // 0: waiting, 1: distributing, 2: finishing
    timer: 0
};

// Colors
const COLORS = ['#F87171', '#FB923C', '#FBBF24', '#34D399', '#60A5FA', '#818CF8', '#A78BFA', '#F472B6'];

function initSimulation() {
    resize();
    resetSimulation();
}

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    if (!state.running) draw();
}

function resetSimulation() {
    state.running = false;
    state.paused = false;
    state.ended = false;
    state.currentIndex = 0;
    state.distributionStep = 0;
    state.timer = 0;
    
    btnText.innerText = "开始分糖果";
    btnIcon.innerText = "▶";
    resultOverlay.classList.add('translate-y-32', 'opacity-0');
    resultOverlay.classList.remove('translate-y-0', 'opacity-100');
    
    updateDisplay();
    createObjects();
    draw();
}

function createObjects() {
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;
    
    state.friends = [];
    const fCount = state.friend_count;
    const padding = 20;
    const areaWidth = w - padding * 2;
    const boxWidth = Math.min(80, areaWidth / fCount - 10);
    const totalBoxWidth = (boxWidth + 10) * fCount - 10;
    const startX = (w - totalBoxWidth) / 2;
    const boxY = h * 0.65;

    for (let i = 0; i < fCount; i++) {
        state.friends.push({
            x: startX + i * (boxWidth + 10),
            y: boxY,
            w: boxWidth,
            h: boxWidth * 0.8,
            candyCount: 0,
            label: `第${i+1}人`
        });
    }

    state.candies = [];
    const candySize = Math.min(18, 400 / state.candy_total);
    const basketX = w / 2;
    const basketY = h * 0.3;

    for (let i = 0; i < state.candy_total; i++) {
        // Random spiral position in basket
        const angle = i * 0.8;
        const dist = Math.sqrt(i) * (candySize * 1.5);
        state.candies.push({
            x: basketX + Math.cos(angle) * dist,
            y: basketY + Math.sin(angle) * dist,
            originX: basketX + Math.cos(angle) * dist,
            originY: basketY + Math.sin(angle) * dist,
            targetX: 0,
            targetY: 0,
            size: candySize,
            color: COLORS[i % COLORS.length],
            assigned: false,
            friendIndex: -1,
            progress: 0
        });
    }
}

function handleMainAction() {
    if (state.ended) {
        resetSimulation();
        setTimeout(startSimulation, 50);
    } else if (state.running) {
        state.paused = !state.paused;
        btnText.innerText = state.paused ? "继续分配" : "暂停分配";
        btnIcon.innerText = state.paused ? "▶" : "⏸";
    } else {
        startSimulation();
    }
}

function startSimulation() {
    state.running = true;
    state.paused = false;
    state.ended = false;
    state.currentIndex = 0;
    state.distributionStep = 1;
    btnText.innerText = "暂停分配";
    btnIcon.innerText = "⏸";
    requestAnimationFrame(update);
}

function update(time) {
    if (!state.running || state.paused) return;

    const dt = time - state.lastUpdate;
    state.lastUpdate = time;

    const perFriend = Math.floor(state.candy_total / state.friend_count);
    const totalToDistribute = perFriend * state.friend_count;

    // Distribution logic
    if (state.currentIndex < totalToDistribute) {
        let c = state.candies[state.currentIndex];
        
        if (!c.assigned) {
            c.assigned = true;
            c.friendIndex = state.currentIndex % state.friend_count;
            const friend = state.friends[c.friendIndex];
            
            // Calculate grid position inside friend box
            const col = Math.floor(friend.candyCount / 3);
            const row = friend.candyCount % 3;
            c.targetX = friend.x + 10 + row * (c.size * 1.8);
            c.targetY = friend.y + friend.h - 10 - col * (c.size * 1.8);
            friend.candyCount++;
        }

        c.progress += state.animationSpeed;
        if (c.progress >= 1) {
            c.progress = 1;
            c.x = c.targetX;
            c.y = c.targetY;
            state.currentIndex++;
        } else {
            // Easing
            const t = c.progress;
            c.x = c.originX + (c.targetX - c.originX) * t;
            c.y = c.originY + (c.targetY - c.originY) * t - Math.sin(t * Math.PI) * 50;
        }
    } else {
        // Handle Remainder (move slightly or highlight)
        if (state.currentIndex < state.candy_total) {
            let c = state.candies[state.currentIndex];
            if (!c.assigned) {
                c.assigned = true;
                c.friendIndex = -1; // Remainder
                const basketX = (canvas.width / window.devicePixelRatio) / 2;
                const basketY = (canvas.height / window.devicePixelRatio) * 0.25;
                c.targetX = basketX - 50 + (state.currentIndex - totalToDistribute) * (c.size * 2.5);
                c.targetY = basketY + 80;
            }
            c.progress += state.animationSpeed;
            if (c.progress >= 1) {
                c.progress = 1;
                c.x = c.targetX;
                c.y = c.targetY;
                state.currentIndex++;
            } else {
                c.x = c.originX + (c.targetX - c.originX) * c.progress;
                c.y = c.originY + (c.targetY - c.originY) * c.progress;
            }
        } else {
            endSimulation();
        }
    }

    draw();
    if (state.running) requestAnimationFrame(update);
}

function endSimulation() {
    state.running = false;
    state.ended = true;
    btnText.innerText = "重新开始";
    btnIcon.innerText = "↺";
    
    const quotient = Math.floor(state.candy_total / state.friend_count);
    const remainder = state.candy_total % state.friend_count;
    
    resultText.innerHTML = `每位小伙伴分到 <span class="text-blue-600 font-bold">${quotient}</span> 颗，篮子里还剩下 <span class="text-rose-500 font-bold">${remainder}</span> 颗无法平均分配。`;
    resultOverlay.classList.remove('translate-y-32', 'opacity-0');
    resultOverlay.classList.add('translate-y-0', 'opacity-100');
    
    // Add highlight effect to remainder
    draw();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;

    // Draw Basket area
    ctx.fillStyle = '#f1f5f9';
    ctx.beginPath();
    ctx.roundRect(w/2 - 80, h*0.15, 160, 100, 20);
    ctx.fill();
    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('糖果篮', w/2, h*0.15 - 10);

    // Draw Remainder Zone
    const remainder = state.candy_total % state.friend_count;
    if (state.ended && remainder > 0) {
        ctx.strokeStyle = '#fda4af';
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2;
        ctx.strokeRect(w/2 - 60, h*0.3 + 60, 120, 40);
        ctx.setLineDash([]);
        ctx.fillStyle = '#f43f5e';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText(`剩下 ${remainder} 颗`, w/2, h*0.3 + 55);
    }

    // Draw Friends/Boxes
    state.friends.forEach((f, idx) => {
        // Box
        ctx.fillStyle = 'white';
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(f.x, f.y, f.w, f.h, 10);
        ctx.fill();
        ctx.stroke();

        // Label
        ctx.fillStyle = '#64748b';
        ctx.font = '11px sans-serif';
        ctx.fillText(f.label, f.x + f.w/2, f.y + f.h + 15);
        
        // Count tag if ended
        if (state.ended) {
            ctx.fillStyle = '#2563eb';
            ctx.font = 'bold 14px math-font';
            ctx.fillText(f.candyCount, f.x + f.w/2, f.y + f.h/2 + 5);
        }
    });

    // Draw Candies
    state.candies.forEach((c, idx) => {
        ctx.save();
        ctx.translate(c.x, c.y);
        
        // Draw Candy Body
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, c.size, c.size * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw Wrappers
        ctx.beginPath();
        ctx.moveTo(-c.size, 0);
        ctx.lineTo(-c.size * 1.5, -c.size * 0.5);
        ctx.lineTo(-c.size * 1.5, c.size * 0.5);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(c.size, 0);
        ctx.lineTo(c.size * 1.5, -c.size * 0.5);
        ctx.lineTo(c.size * 1.5, c.size * 0.5);
        ctx.closePath();
        ctx.fill();

        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(-c.size*0.3, -c.size*0.2, c.size*0.3, c.size*0.2, 0, 0, Math.PI*2);
        ctx.fill();
        
        ctx.restore();
    });
}

function updateDisplay() {
    const total = state.candy_total;
    const friends = state.friend_count;
    const quotient = Math.floor(total / friends);
    const remainder = total % friends;

    document.getElementById('candy_total-display').innerText = `${total} 颗`;
    document.getElementById('friend_count-display').innerText = `${friends} 人`;
    
    equationView.innerHTML = `${total} ÷ ${friends} = <span class="text-blue-600">${quotient}</span> ... <span class="text-rose-500">${remainder}</span>`;
}

function applyPreset(total, friends) {
    document.getElementById('candy_total-slider').value = total;
    document.getElementById('friend_count-slider').value = friends;
    state.candy_total = total;
    state.friend_count = friends;
    resetSimulation();
}

// Event Listeners
document.getElementById('candy_total-slider').addEventListener('input', (e) => {
    state.candy_total = parseInt(e.target.value);
    resetSimulation();
});

document.getElementById('friend_count-slider').addEventListener('input', (e) => {
    state.friend_count = parseInt(e.target.value);
    resetSimulation();
});

window.addEventListener('resize', resize);

// Teacher postMessage handler
window.addEventListener('message', function(event) {
    const { type, target, state: newState, content } = event.data;

    switch (type) {
        case 'SET_WIDGET_STATE':
            if (newState) {
                Object.entries(newState).forEach(([key, value]) => {
                    const slider = document.getElementById(key + '-slider');
                    if (slider) {
                        slider.value = value;
                        state[key] = parseInt(value);
                    }
                });
                resetSimulation();
            }
            break;
        case 'HIGHLIGHT_ELEMENT':
            const el = document.querySelector(target);
            if (el) {
                el.style.outline = '4px solid #2563eb';
                el.style.outlineOffset = '4px';
                setTimeout(() => el.style.outline = '', 3000);
            }
            break;
        case 'ANNOTATE_ELEMENT':
            const targetEl = document.querySelector(target);
            if (targetEl && content) {
                const rect = targetEl.getBoundingClientRect();
                const tooltip = document.createElement('div');
                tooltip.className = 'teacher-annotation fixed bg-blue-600 text-white px-3 py-2 rounded-lg text-sm z-50 shadow-lg';
                tooltip.style.top = (rect.top - 50) + 'px';
                tooltip.style.left = rect.left + 'px';
                tooltip.textContent = content;
                document.body.appendChild(tooltip);
                setTimeout(() => tooltip.remove(), 4000);
            }
            break;
    }
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        handleMainAction();
    }
    if (e.code === 'KeyR') {
        resetSimulation();
    }
});

// Initialize
initSimulation();
</script>

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
