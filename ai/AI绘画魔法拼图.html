<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 绘画魔法拼图</title>
    
    <script src="https://cdn.jsdelivr.net/gh/sirwym/notes@main/assets/js/tailwind.js"
            onerror="this.onerror=null;this.src='../assets/js/tailwind.js'"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eff6ff; }
        .kid-font { font-family: 'ZCOOL KuaiLe', cursive; }
        
        /* 优化滚动条体验 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .btn-selected {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3) !important;
            transform: scale(0.98);
        }
        
        /* 限制拼图列表高度，内部平滑滚动 */
        .puzzle-group { 
            max-height: 55vh; /* 动态适应屏幕高度 */
            overflow-y: auto; 
            padding-right: 4px; 
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <header class="mb-6 text-center">
        <h1 class="text-4xl font-bold text-blue-600 kid-font mb-2">🎨 AI 绘画魔法拼图</h1>
        <p class="text-blue-600 font-medium text-lg">点一点，拼一拼，对 AI 念出你的魔法咒语！</p>
    </header>

    <div class="max-w-7xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-100">
        
        <div class="bg-gradient-to-r from-blue-50 to-blue-100 p-6 md:p-8 border-b-2 border-dashed border-gray-200">
            <h2 class="text-gray-500 font-bold mb-2 flex items-center">
                <span class="mr-2">✨</span> 你的专属魔法咒语：
            </h2>
            <div class="bg-white p-4 rounded-2xl shadow-inner min-h-[100px] text-xl font-medium text-gray-700 leading-relaxed break-words border border-gray-100" id="prompt-display">
                <span class="text-gray-300 italic">请在下方选择拼图块...</span>
            </div>
            
            <div class="mt-6 flex gap-4 justify-end">
                <button onclick="clearPrompt()" class="px-6 py-3 rounded-xl font-bold text-gray-500 bg-white border border-gray-200 hover:bg-gray-50 transition shadow-sm">
                    🗑️ 重新拼装
                </button>
                <button id="copy-btn" onclick="copyPrompt()" class="px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg hover:shadow-xl transition flex items-center transform active:scale-95">
                    <span class="mr-2">📋</span> <span id="copy-text">一键复制咒语</span>
                </button>
            </div>
        </div>

        <div class="p-4 md:p-6 bg-gray-50">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6" id="puzzle-board">
                
                <div class="flex flex-col h-full bg-white p-3 rounded-2xl shadow-sm border border-gray-100 relative">
                    <div class="bg-red-100 text-red-600 font-bold px-4 py-2 rounded-xl text-center kid-font text-lg shadow-sm mb-3 sticky top-0 z-10 backdrop-blur-md bg-opacity-90">1. 画什么 (主体)</div>
                    <div class="flex flex-col gap-2 puzzle-group" id="group-subject"></div>
                </div>

                <div class="flex flex-col h-full bg-white p-3 rounded-2xl shadow-sm border border-gray-100 relative">
                    <div class="bg-blue-100 text-blue-600 font-bold px-4 py-2 rounded-xl text-center kid-font text-lg shadow-sm mb-3 sticky top-0 z-10 backdrop-blur-md bg-opacity-90">2. 在哪里 (环境)</div>
                    <div class="flex flex-col gap-2 puzzle-group" id="group-env"></div>
                </div>

                <div class="flex flex-col h-full bg-white p-3 rounded-2xl shadow-sm border border-gray-100 relative">
                    <div class="bg-orange-100 text-orange-600 font-bold px-4 py-2 rounded-xl text-center kid-font text-lg shadow-sm mb-3 sticky top-0 z-10 backdrop-blur-md bg-opacity-90">3. 干什么 (细节)</div>
                    <div class="flex flex-col gap-2 puzzle-group" id="group-action"></div>
                </div>

                <div class="flex flex-col h-full bg-white p-3 rounded-2xl shadow-sm border border-gray-100 relative">
                    <div class="bg-purple-100 text-purple-600 font-bold px-4 py-2 rounded-xl text-center kid-font text-lg shadow-sm mb-3 sticky top-0 z-10 backdrop-blur-md bg-opacity-90">4. 什么画风 (风格)</div>
                    <div class="flex flex-col gap-2 puzzle-group" id="group-style"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-8 bg-white px-6 py-4 rounded-full shadow-md text-gray-600 font-medium text-sm flex items-center gap-4 flex-wrap justify-center border border-gray-100">
        <span class="text-blue-600 font-bold">🪄 复制咒语后，请选择召唤魔法师：</span>
        <a href="https://jimeng.jianying.com/" target="_blank" class="px-4 py-2 bg-gradient-to-r from-blue-500 to-cyan-500 text-white rounded-full hover:shadow-lg transition">🚀 即梦 (Jimeng)</a>
        <a href="https://www.doubao.com" target="_blank" class="px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-full hover:shadow-lg transition">🤖 豆包 (Doubao)</a>

            { label: "🧪 摇晃彩色试管", prompt: "正聚精会神地摇晃着手里五颜六色、不断冒着彩色泡泡的化学试管" },

        ];

        // 状态存储
        let currentPrompt = { subject: "", env: "", action: "", style: "" };

        // 动态生成按钮的函数
        function renderButtons(containerId, category, dataArray, colorClass) {
            const container = document.getElementById(containerId);
            let html = '';
            dataArray.forEach((item) => {
                // 转义处理避免引号冲突
                const promptText = item.prompt.replace(/'/g, "\\'");
                html += `
                    <button onclick="selectItem('${category}', '${promptText}', this, '${colorClass}')" 
                            class="puzzle-btn bg-gray-50 border-2 border-transparent text-left p-3 rounded-xl hover:border-${colorClass}-300 hover:bg-${colorClass}-50 transition text-sm font-medium text-gray-700">
                        ${item.label}
                    </button>
                `;
            });
            container.innerHTML = html;
        }

        // 页面加载时渲染所有按钮
        window.onload = function() {
            renderButtons('group-subject', 'subject', subjects, 'red');
            renderButtons('group-env', 'env', envs, 'blue');
            renderButtons('group-action', 'action', actions, 'orange');
            renderButtons('group-style', 'style', styles, 'purple');
        };

        function selectItem(category, text, btnElement, colorClass) {
            currentPrompt[category] = text;

            const group = document.getElementById(`group-${category}`);
            const buttons = group.getElementsByTagName('button');
            for (let btn of buttons) {
                btn.classList.remove('btn-selected');
                // 恢复默认颜色
                btn.classList.remove(`bg-${colorClass}-50`);
            }
            
            btnElement.classList.add('btn-selected');
            btnElement.classList.add(`bg-${colorClass}-50`);

            updateDisplay();
            resetCopyButton();
        }

        function updateDisplay() {
            const display = document.getElementById('prompt-display');
            
            if (!currentPrompt.subject && !currentPrompt.env && !currentPrompt.action && !currentPrompt.style) {
                display.innerHTML = '<span class="text-gray-300 italic">请在下方选择拼图块...</span>';
                return;
            }

            let finalPrompt = "";
            if (currentPrompt.subject) finalPrompt += `<span class="text-red-500 font-bold">${currentPrompt.subject}</span>，`;
            if (currentPrompt.env) finalPrompt += `<span class="text-blue-500">${currentPrompt.env}</span>，`;
            if (currentPrompt.action) finalPrompt += `<span class="text-orange-500">${currentPrompt.action}</span>。`;
            if (currentPrompt.style) finalPrompt += `<br><span class="text-purple-500 mt-2 block">【画风要求】：${currentPrompt.style}</span>`;

            display.innerHTML = finalPrompt;
        }

        function clearPrompt() {
            currentPrompt = { subject: "", env: "", action: "", style: "" };
            const allButtons = document.querySelectorAll('.puzzle-btn');
            allButtons.forEach(btn => {
                btn.classList.remove('btn-selected');
                // 移除可能的选中背景色
                btn.classList.remove('bg-red-50', 'bg-blue-50', 'bg-orange-50', 'bg-purple-50');
            });
            updateDisplay();
            resetCopyButton();
        }

        function copyPrompt() {
            let rawText = "";
            if (currentPrompt.subject) rawText += currentPrompt.subject + "，";
            if (currentPrompt.env) rawText += currentPrompt.env + "，";
            if (currentPrompt.action) rawText += currentPrompt.action + "。";
            if (currentPrompt.style) rawText += "画风要求：" + currentPrompt.style;

            if (rawText === "") {
                alert("你还没有拼接任何咒语哦！");
                return;
            }

            navigator.clipboard.writeText(rawText).then(() => {
                const copyBtn = document.getElementById('copy-btn');
                const copyText = document.getElementById('copy-text');
                copyBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                copyBtn.classList.add('bg-blue-500', 'hover:bg-blue-600');
                copyText.innerText = "复制成功！快去粘贴吧";
            }).catch(err => {
                alert("复制失败，请手动选中文字复制。");
            });
        }

        function resetCopyButton() {
            const copyBtn = document.getElementById('copy-btn');
            const copyText = document.getElementById('copy-text');
            copyBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            copyBtn.classList.remove('bg-blue-500', 'hover:bg-blue-600');
            copyText.innerText = "一键复制咒语";
        }
    </script>
</body>
</html>
